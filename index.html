<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رحلة البطل الأمين – حصة الضرب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:"Tajawal",Arial;
  background:#eef6ee;
  color:#1b5e20;
}
.container{max-width:760px;margin:auto;padding:16px}
.topbar{
  position:sticky;top:0;z-index:10;
  background:#1b5e20;color:white;
  padding:10px;border-radius:16px;
  display:flex;justify-content:space-between;align-items:center
}
.topbar button{
  background:#43a047;border:none;border-radius:12px;
  color:white;padding:6px 14px;font-size:14px
}
.card{
  background:#fff;margin-top:12px;
  padding:20px;border-radius:20px;
  box-shadow:0 6px 14px rgba(0,0,0,.1)
}
.character{display:flex;gap:12px;align-items:center}
.avatar{font-size:44px}
.name{font-weight:bold;font-size:18px}
.speech{
  margin-top:10px;
  background:#e0f2f1;
  padding:16px;
  border-radius:16px;
  line-height:2;
  font-size:18px
}
.visual{text-align:center;font-size:28px;margin:14px 0}
input{
  width:100%;padding:10px;
  font-size:22px;text-align:center;
  border-radius:14px;border:1px solid #c8e6c9
}
button.action{
  margin-top:10px;
  background:#43a047;color:white;
  padding:10px 20px;
  font-size:17px;border:none;
  border-radius:16px
}
button.disabled{opacity:.5}
.helper{
  display:none;margin-top:10px;
  background:#fff8e1;
  padding:14px;border-radius:14px
}
.hidden{display:none}
.timer{font-size:13px;opacity:.85}
</style>
</head>

<body>
<div class="container">

<!-- الشريط العلوي -->
<div class="topbar">
  <div>
    <button onclick="toggleFullscreen()">🖥️ ملء الشاشة</button>
    <button onclick="toggleSound()">🔈 الصوت</button>
  </div>
  <div id="timer" class="timer">جاهز</div>
</div>

<!-- التهيئة -->
<div id="intro" class="card">
  <div class="character">
    <div class="avatar">🧔🏻‍♂️</div>
    <div class="name">الحكيم إبراهيم</div>
  </div>
  <div class="speech">
    يا بطل 🌿<br>
    سنسير معًا خطوة خطوة.<br>
    <b>التعلّم عبادة، والله معك.</b>
  </div>

  <p>اسم الطالب:</p>
  <input id="studentName">

  <p>اسم ولي الأمر:</p>
  <input id="parentName">

  <button class="action" onclick="start()">ابدأ الرحلة 🤍</button>
</div>

<!-- الحصة -->
<div id="lesson" class="card hidden">
  <div class="character" id="characterBox"></div>
  <div id="text" class="speech"></div>
  <div id="visual" class="visual"></div>
  <input id="answer" class="hidden" inputmode="numeric" placeholder="كم الناتج؟">
  <button id="nextBtn" class="action disabled" onclick="next()">التالي ⏭️</button>
  <button class="action" onclick="help()">أنا محتار</button>
  <button class="action" onclick="speak()">🗣️ استمع</button>
  <div id="helper" class="helper"></div>
</div>

</div>

<script>
/* ========= متغيرات ========= */
let student="",parent="";
let stage=0;
let a=0,b=0;
let soundOn=true;
let wait=10000,startWait=0,presses=0;

/* ========= عناصر ========= */
const intro=document.getElementById("intro");
const lesson=document.getElementById("lesson");
const text=document.getElementById("text");
const visual=document.getElementById("visual");
const answer=document.getElementById("answer");
const helper=document.getElementById("helper");
const nextBtn=document.getElementById("nextBtn");
const timer=document.getElementById("timer");
const characterBox=document.getElementById("characterBox");

/* ========= أدوات ========= */
const eastern=n=>n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
const setCharacter=(icon,name)=>{
  characterBox.innerHTML=
    `<div class="avatar">${icon}</div><div class="name">${name}</div>`;
};

/* ========= صوت بدون رموز ========= */
function cleanSpeech(t){
  return t.replace(/[^\u0600-\u06FF0-9\s.,؟!]/g,"");
}
function speak(){
  if(!soundOn||!speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(cleanSpeech(text.innerText));
  u.lang="ar-SA";u.rate=0.9;
  speechSynthesis.speak(u);
}
function toggleSound(){
  soundOn=!soundOn;
  if(!soundOn)speechSynthesis.cancel();
}

/* ========= شاشة كاملة ========= */
function toggleFullscreen(){
  if(!document.fullscreenElement)
    document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

/* ========= مؤقت ========= */
function lockNext(){
  nextBtn.classList.add("disabled");
  presses=0;startWait=Date.now();
  const i=setInterval(()=>{
    const r=Math.max(0,wait-(Date.now()-startWait));
    timer.innerText=r>0?`انتظر ${Math.ceil(r/1000)} ثوانٍ… الله مع الصابرين`:`يمكن المتابعة`;
    if(r<=0){clearInterval(i);nextBtn.classList.remove("disabled");}
  },500);
}

/* ========= بدء ========= */
function start(){
  student=document.getElementById("studentName").value||"بطلنا";
  parent=document.getElementById("parentName").value||"ولي أمره";
  intro.classList.add("hidden");
  lesson.classList.remove("hidden");
  stage=0;render();
}

/* ========= العرض ========= */
function render(){
  helper.style.display="none";
  visual.innerHTML="";
  answer.classList.add("hidden");
  setTimeout(speak,200);

  if(stage===0){
    setCharacter("🧔🏻‍♂️","الحكيم إبراهيم");
    text.innerText=
`مرحبًا يا ${student}.
سنفكّر معًا بهدوء.
لا استعجال، والله معك.`;
    lockNext();
  }

  if(stage===1){
    setCharacter("👨‍🏫","الشرح");
    text.innerText=
`الضرب يعني جمعًا متكررًا.
مجموعات متساوية نعدّها معًا.`;
    visual.innerHTML="🔢 🔢 🔢";
    lockNext();
  }

  if(stage===2){
    setCharacter("🐑","الراعي الأمين");
    a=3;b=2;
    text.innerText=
`لدى الراعي ${eastern(a)} حظائر.
في كل حظيرة ${eastern(b)} خراف.
كم خروفًا لديه؟`;
    for(let i=0;i<a;i++)visual.innerHTML+="🐑 ".repeat(b)+"<br>";
    answer.classList.remove("hidden");
    lockNext();
  }

  if(stage===3){
    setCharacter("⭐","تشجيع");
    text.innerText=
`أحسنت يا ${student}.
محاولتك عبادة جميلة.
الله يرى جهدك ويباركه.`;
    visual.innerHTML="🌟";
    lockNext();
  }

  if(stage===4){
    setCharacter("✍️","نشاط");
    text.innerText=
`أحضر دفترك.
ارسم ثلاث دوائر،
وفي كل دائرة نقطتين.`;
    lockNext();
  }

  if(stage===5){
    setCharacter("🤲","خاتمة");
    text.innerText=
`بارك الله فيك يا ${student}.
سيفرح بك ${parent}.
إلى لقاءٍ طيب بإذن الله.`;
    nextBtn.textContent="انتهت الحصة ✅";
    nextBtn.classList.add("disabled");
  }
}

/* ========= التالي ========= */
function next(){
  if(nextBtn.classList.contains("disabled")){
    presses++;
    helper.style.display="block";
    helper.innerText=
presses===1?"خذ وقتك وعدّ بهدوء."
:presses===2?"الصبر مفتاح الفهم."
:"محاولتك عبادة جميلة.";
    speak();return;
  }

  if(stage===2 && Number(answer.value)!==a*b){
    helper.style.display="block";
    helper.innerText=
"لا بأس، لنعدّ مرة أخرى بهدوء.";
    speak();return;
  }

  stage++;
  render();
}

/* ========= مساعدة ========= */
function help(){
  helper.style.display="block";
  helper.innerText=
`لدينا ${eastern(a)} مجموعات،
في كل مجموعة ${eastern(b)} عناصر،
الضرب هو جمع متكرر.`;
  speak();
}
</script>

</body>
</html>
