<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رحلة التعلّم – الضرب بالقصص</title>

<style>
body{
  font-family:"Tajawal",Arial;
  background:#eef7ee;
  margin:0;
  color:#1b5e20;
}
.container{max-width:600px;margin:auto;padding:16px}
.card{
  background:#ffffff;
  border-radius:18px;
  padding:18px;
  margin-top:14px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}
.character{display:flex;gap:10px;align-items:center}
.avatar{font-size:36px}
.name{font-weight:bold}
.speech{
  background:#e0f2f1;
  padding:14px;
  border-radius:14px;
  line-height:1.9;
}
.visual{text-align:center;font-size:26px;margin:10px 0}
input{
  width:100%;
  font-size:22px;
  text-align:center;
  padding:6px;
}
button{
  padding:10px 16px;
  font-size:16px;
  border-radius:14px;
  border:none;
  background:#43a047;
  color:white;
  margin-top:8px;
}
.secondary{background:#1b5e20}
.hidden{display:none}
.note{
  background:#fff8e1;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}
.progress{
  font-size:14px;
  margin-top:8px;
  color:#2e7d32;
}
</style>
</head>

<body>
<div class="container">

<div id="intro" class="card">
  <div class="character">
    <div class="avatar">🧔🏻‍♂️</div>
    <div class="name">المعلّم</div>
  </div>
  <div class="speech">
    بسم الله 🌿  
    سنتعلّم اليوم خطوة خطوة،  
    والهدوء والصبر طريق النجاح.  
    <b>محاولتك عبادة جميلة.</b>
  </div>

  <p>اسم الطالب:</p>
  <input id="studentName">

  <p>اسم ولي الأمر:</p>
  <input id="parentName">

  <button onclick="startLesson()">ابدأ الدرس 🤍</button>
</div>

<div id="lesson" class="card hidden">
  <div class="character" id="charBox"></div>
  <div class="speech" id="textBox"></div>

  <div class="visual" id="visualBox"></div>

  <input id="answer" placeholder="اكتب الناتج">

  <button onclick="check()">أفكّر بهدوء</button>
  <button class="secondary" onclick="help()">أحتاج مساعدة</button>

  <div id="note" class="note hidden"></div>
  <div class="progress" id="progress"></div>
</div>

</div>

<script>
/* ——— بيانات الطالب ——— */
let student="", parent="";

/* ——— تتبع الأداء ——— */
let level=1;
let correct=0;
let wrong=0;
let tries=0;

/* ——— المسألة الحالية ——— */
let a=0,b=0;

/* ——— عناصر ——— */
const intro=document.getElementById("intro");
const lesson=document.getElementById("lesson");
const charBox=document.getElementById("charBox");
const textBox=document.getElementById("textBox");
const visualBox=document.getElementById("visualBox");
const answer=document.getElementById("answer");
const note=document.getElementById("note");
const progress=document.getElementById("progress");

/* ——— أرقام عربية ——— */
function ar(n){
  return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
}

/* ——— بدء ——— */
function startLesson(){
  student=document.getElementById("studentName").value||"بطلنا";
  parent=document.getElementById("parentName").value||"وليّه";
  intro.classList.add("hidden");
  lesson.classList.remove("hidden");
  nextProblem();
}

/* ——— إنشاء مسألة حسب المستوى ——— */
function generate(){
  if(level===1){ a=2+Math.floor(Math.random()*2); b=1+Math.floor(Math.random()*2); }
  if(level===2){ a=3+Math.floor(Math.random()*2); b=2+Math.floor(Math.random()*2); }
  if(level>=3){ a=4+Math.floor(Math.random()*2); b=3+Math.floor(Math.random()*2); }
}

/* ——— عرض مسألة ——— */
function nextProblem(){
  note.classList.add("hidden");
  answer.value="";
  generate();

  charBox.innerHTML=`<div class="avatar">👨‍🏫</div><div class="name">المعلّم</div>`;
  textBox.innerHTML=
    `يا ${student} 🌿  
    لدينا ${ar(a)} مجموعات،  
    في كل مجموعة ${ar(b)} عناصر.  
    كم المجموع؟`;

  visualBox.innerHTML="";
  for(let i=0;i<a;i++){
    visualBox.innerHTML+="⭐ ".repeat(b)+"<br>";
  }

  progress.innerHTML=
    `محاولاتك: ${ar(tries)} | أحسنت: ${ar(correct)}`;
}

/* ——— التحقق ——— */
function check(){
  tries++;
  if(Number(answer.value)===a*b){
    correct++;
    wrong=0;

    // تدرّج
    if(correct%3===0) level++;

    note.innerHTML=
      `أحسنت يا ${student} 🌟  
      الله يرى جهدك ويباركه.  
      هذا يفرح ${parent}.`;
    note.classList.remove("hidden");

    setTimeout(nextProblem,1500);
  }else{
    wrong++;
    if(wrong>=2){
      help(true);
    }else{
      textBox.innerHTML=
        `لا بأس 🌷  
        الخطأ مرحلة تعلّم،  
        خذ نفسًا عميقًا والله معك.`;
    }
  }
}

/* ——— مساعدة ذكية ——— */
function help(force){
  note.classList.remove("hidden");
  note.innerHTML=
    `نعدّ بهدوء ✏️  
    ${ar(a)} × ${ar(b)}  
    جرّب أن تجمع ${ar(b)}  
    ${ar(a)} مرات في دفترك.`;

  if(force){
    charBox.innerHTML=`<div class="avatar">👩‍👦</div><div class="name">${parent}</div>`;
  }
}
</script>

</body>
</html>
