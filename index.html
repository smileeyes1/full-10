<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رحلة البطل الأمين – درس الضرب</title>

<style>
*{box-sizing:border-box}
body{
  font-family:"Tajawal",Arial,sans-serif;
  background:#eef7ee;
  margin:0;
  color:#1b5e20;
}
.container{
  max-width:650px;
  margin:auto;
  padding:16px
}
.card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-top:14px;
  box-shadow:0 4px 10px rgba(0,0,0,.08)
}
.character{
  display:flex;
  gap:10px;
  align-items:center
}
.avatar{font-size:36px}
.name{font-weight:bold}
.speech{
  background:#e0f2f1;
  padding:14px;
  border-radius:14px;
  line-height:1.9;
  white-space:pre-line
}
.visual{
  text-align:center;
  font-size:26px;
  margin:10px 0;
  line-height:1.6
}
input{
  width:100%;
  font-size:22px;
  text-align:center;
  padding:8px;
  border-radius:12px;
  border:1px solid #c8e6c9
}
button{
  padding:10px 16px;
  font-size:16px;
  border-radius:14px;
  border:none;
  background:#43a047;
  color:white;
  margin-top:8px;
  cursor:pointer
}
button:disabled{
  opacity:.6;
  cursor:not-allowed
}
.secondary{background:#1b5e20}
.note{
  background:#fff8e1;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  white-space:pre-line
}
.progress{
  font-size:14px;
  margin-top:8px;
  color:#2e7d32
}
.hidden{display:none}
</style>
</head>

<body>
<div class="container">

<!-- المقدمة -->
<div id="intro" class="card">
  <div class="character">
    <div class="avatar">🧔🏻‍♂️</div>
    <div class="name">المعلّم</div>
  </div>
  <div class="speech">
بسم الله 🌿
هذا درس هادئ متدرّج،
لا نستعجل فيه، ولا نوبّخ.
<b>محاولتك عبادة جميلة، والله مع الصابرين.</b>
  </div>

  <p>اسم الطالب:</p>
  <input id="studentName">

  <p>اسم ولي الأمر:</p>
  <input id="parentName">

  <button onclick="enableSound()">🔊 تفعيل الصوت</button>
  <button onclick="startLesson()">ابدأ الدرس 🤍</button>
</div>

<!-- الدرس -->
<div id="lesson" class="card hidden">
  <div class="character" id="charBox"></div>
  <div class="speech" id="textBox"></div>
  <div class="visual" id="visualBox"></div>

  <input id="answer" inputmode="numeric" placeholder="اكتب الناتج هنا">

  <button id="checkBtn" onclick="check()">أفكّر بهدوء</button>
  <button class="secondary" onclick="help()">أحتاج مساعدة</button>

  <div id="note" class="note hidden"></div>
  <div id="progress" class="progress"></div>
</div>

</div>

<script>
/* ===== دعم الأرقام العربية ===== */
function ar(n){
  return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
}

/* ===== الصوت ===== */
let soundEnabled=false;
let voice=null;

function enableSound(){
  if(!("speechSynthesis" in window)){
    alert("الصوت غير مدعوم في هذا المتصفح");
    return;
  }
  soundEnabled=true;
  speechSynthesis.cancel();
  loadVoices();
  alert("✅ تم تفعيل الصوت");
}

function loadVoices(){
  const voices=speechSynthesis.getVoices();
  voice=voices.find(v=>v.lang.startsWith("ar"))||null;
}
speechSynthesis.onvoiceschanged=loadVoices;

function speak(text){
  if(!soundEnabled)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  if(voice)u.voice=voice;
  u.lang="ar-SA";
  u.rate=0.9;
  speechSynthesis.speak(u);
}

/* ===== بيانات ===== */
let student="",parent="";
let level=1;
let correct=0,wrong=0,total=0;
let a=0,b=0;
const MAX_LEVEL=3;

/* ===== عناصر ===== */
const intro=document.getElementById("intro");
const lesson=document.getElementById("lesson");
const charBox=document.getElementById("charBox");
const textBox=document.getElementById("textBox");
const visualBox=document.getElementById("visualBox");
const note=document.getElementById("note");
const answer=document.getElementById("answer");
const progress=document.getElementById("progress");
const checkBtn=document.getElementById("checkBtn");

/* ===== بدء ===== */
function startLesson(){
  student=document.getElementById("studentName").value||"بطلنا";
  parent=document.getElementById("parentName").value||"وليّه";
  intro.classList.add("hidden");
  lesson.classList.remove("hidden");
  nextProblem();
}

/* ===== توليد ===== */
function gen(){
  if(level===1){
    a=2+Math.floor(Math.random()*2);
    b=1+Math.floor(Math.random()*2);
  }
  else if(level===2){
    a=3+Math.floor(Math.random()*2);
    b=2+Math.floor(Math.random()*2);
  }
  else{
    a=4+Math.floor(Math.random()*2);
    b=3+Math.floor(Math.random()*2);
  }
}

/* ===== مسألة ===== */
function nextProblem(){
  note.classList.add("hidden");
  answer.value="";
  gen();

  charBox.innerHTML=`<div class="avatar">👨‍🏫</div><div class="name">المعلّم</div>`;
  const t=`يا ${student} 🌿
لدينا ${ar(a)} مجموعات،
في كل مجموعة ${ar(b)} عناصر.
كم المجموع؟`;
  textBox.innerText=t;
  speak(t);

  visualBox.innerHTML="";
  for(let i=0;i<a;i++){
    visualBox.innerHTML+="⭐ ".repeat(b)+"<br>";
  }
  progress.innerText=`محاولاتك: ${ar(total)} | الصحيح: ${ar(correct)}`;
}

/* ===== تحقق ===== */
function check(){
  const val=Number(answer.value);
  if(!Number.isInteger(val)) return;

  checkBtn.disabled=true;
  total++;

  if(val===a*b){
    correct++;
    wrong=0;

    if(correct%5===0 && level<MAX_LEVEL) level++;

    const t=`أحسنت يا ${student} 🌟
محاولتك عبادة جميلة،
وهذا يفرح ${parent}.`;
    note.innerText=t;
    note.classList.remove("hidden");
    speak(t);

    setTimeout(()=>{
      checkBtn.disabled=false;
      nextProblem();
    },1800);

  }else{
    wrong++;
    const t=wrong>=2
    ?`لا بأس 🌷
سأشرح لك بهدوء،
والله مع الصابرين.`
    :`حاول مرة أخرى بهدوء،
وأنا معك.`;
    textBox.innerText=t;
    speak(t);
    checkBtn.disabled=false;
  }
}

/* ===== مساعدة ===== */
function help(){
  const t=`نعدّ بهدوء ✏️
${ar(a)} مجموعات،
في كل مجموعة ${ar(b)}.
اكتب الجمع في دفترك،
واطلب من ${parent} أن يشجّعك 🤍`;
  note.innerText=t;
  note.classList.remove("hidden");
  speak(t);
}
</script>
</body>
</html>
