<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>حصة احترافية – رحلة الضرب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:"Tajawal",Arial;
  margin:0;
  background:#eef6ee;
  color:#1b5e20;
}
.container{max-width:650px;margin:auto;padding:12px}
.card{
  background:#fff;border-radius:20px;padding:18px;margin-top:12px;
  box-shadow:0 6px 14px rgba(0,0,0,.1)
}
.topbar{
  position:sticky;top:0;z-index:10;
  background:#1b5e20;color:#fff;
  padding:10px;border-radius:18px;
  display:flex;justify-content:space-between;align-items:center
}
.topbar button{
  background:#43a047;border:none;border-radius:14px;
  color:white;padding:6px 12px;font-size:14px
}
.character{display:flex;gap:10px;align-items:center}
.avatar{font-size:42px}
.name{font-weight:bold}
.speech{
  background:#e0f2f1;
  padding:16px;border-radius:16px;
  line-height:1.9;font-size:18px
}
.visual{text-align:center;font-size:26px;margin:12px 0}
input{
  width:100%;font-size:22px;
  text-align:center;padding:8px;
  border-radius:14px;border:1px solid #c8e6c9
}
button.action{
  background:#43a047;color:white;
  padding:10px 18px;font-size:17px;
  border-radius:16px;border:none;margin-top:8px
}
button.disabled{opacity:.5}
.helper{
  margin-top:10px;
  background:#fff8e1;
  padding:14px;border-radius:14px;
  display:none
}
.hidden{display:none}
.timer{font-size:13px;opacity:.8}
</style>
</head>

<body>
<div class="container">

<!-- شريط التحكم -->
<div class="topbar">
  <div>
    <button onclick="toggleFullscreen()">🖥️ ملء الشاشة</button>
    <button onclick="toggleSound()">🔈 الصوت</button>
  </div>
  <div id="timer" class="timer">جاهزون</div>
</div>

<!-- المقدمة -->
<div id="intro" class="card">
  <div class="character">
    <div class="avatar">🧔🏻‍♂️</div>
    <div class="name">الحكيم إبراهيم</div>
  </div>
  <div class="speech">
    يا بطل 🌿  
    يسعدني أن نتعلّم معًا اليوم.  
    <b>التعلّم عبادة، وكل محاولة يراها الله.</b>
  </div>

  <p>اسم الطالب:</p>
  <input id="studentName">

  <p>اسم ولي الأمر:</p>
  <input id="parentName">

  <button class="action" onclick="startLesson()">ابدأ الحصة 🤍</button>
</div>

<!-- الحصة -->
<div id="lesson" class="card hidden">
  <div class="character" id="characterBox"></div>
  <div id="text" class="speech"></div>

  <div id="visual" class="visual"></div>

  <input id="answer" class="hidden" inputmode="numeric" placeholder="كم الناتج؟ بالأرقام العربية">

  <button id="nextBtn" class="action disabled" onclick="nextStep()">التالي ⏭️</button>
  <button class="action" onclick="helpMe()">أنا محتار</button>
  <button class="action" onclick="speak()">🗣️ استمع</button>

  <div id="helper" class="helper"></div>
</div>

</div>

<script>
/* المتغيرات */
let student="", parent="";
let stage=0; // مراحل الحصة
let a=0,b=0;
let soundOn=true;
let waitTime=10000;
let startWait=0,presses=0;

/* عناصر */
const intro=document.getElementById("intro");
const lesson=document.getElementById("lesson");
const text=document.getElementById("text");
const visual=document.getElementById("visual");
const answer=document.getElementById("answer");
const helper=document.getElementById("helper");
const nextBtn=document.getElementById("nextBtn");
const timer=document.getElementById("timer");
const characterBox=document.getElementById("characterBox");

/* أدوات */
const eastern=n=>n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
const setChar=(e,n)=>characterBox.innerHTML=`<div class="avatar">${e}</div><div class="name">${n}</div>`;

/* صوت */
function speak(){
  if(!soundOn||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  let u=new SpeechSynthesisUtterance(text.innerText);
  u.lang="ar-SA";u.rate=.9;
  speechSynthesis.speak(u);
}
function toggleSound(){soundOn=!soundOn;if(!soundOn)speechSynthesis.cancel();}

/* ملء شاشة */
function toggleFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

/* مؤقّت */
function lockNext(){
  nextBtn.classList.add("disabled");
  presses=0;startWait=Date.now();
  let i=setInterval(()=>{
    let r=Math.max(0,waitTime-(Date.now()-startWait));
    timer.innerText=r>0?`انتظر ${Math.ceil(r/1000)} ثوانٍ… الله مع الصابرين`:`يمكن المتابعة`;
    if(r<=0){clearInterval(i);nextBtn.classList.remove("disabled");}
  },500);
}

/* بدء */
function startLesson(){
  student=document.getElementById("studentName").value||"بطلنا";
  parent=document.getElementById("parentName").value||"ولي أمره";
  intro.classList.add("hidden");
  lesson.classList.remove("hidden");
  stage=0;render();
}

/* عرض المراحل */
function render(){
  helper.style.display="none";
  visual.innerHTML="";
  answer.classList.add("hidden");
  setTimeout(speak,200);

  if(stage===0){
    setChar("🧔🏻‍♂️","الحكيم إبراهيم");
    text.innerText=
`مرحبًا يا ${student}.
نحن هنا لنتعلّم بهدوء.
لا استعجال، والله معك.`;
    lockNext();
  }

  if(stage===1){
    setChar("👨‍🏫","شرح");
    text.innerText=
`الضرب يعني جمعًا متكررًا.
مجموعات متساوية.
سنعدّ معًا واحدة واحدة.`;
    visual.innerHTML="🔢 🔢 🔢";
    lockNext();
  }

  if(stage===2){
    setChar("🐑","الراعي الأمين");
    a=3;b=2;
    text.innerText=
`لدى الراعي ${eastern(a)} حظائر.
في كل حظيرة ${eastern(b)} خراف.
كم خروفًا لديه؟`;
    for(let i=0;i<a;i++)visual.innerHTML+="🐑 ".repeat(b)+"<br>";
    answer.classList.remove("hidden");
    lockNext();
  }

  if(stage===3){
    setChar("🌟","تشجيع");
    text.innerText=
`أحسنت يا ${student}.
محاولتك عبادة جميلة.
الله يرى جهدك ويباركه.`;
    visual.innerHTML="🌟 🤍 🌱";
    lockNext();
  }

  if(stage===4){
    setChar("✍️","نشاط عملي");
    text.innerText=
`أحضر دفترك.
ارسم ${eastern(a)} دوائر،
في كل دائرة ${eastern(b)} نقاط.`;
    lockNext();
  }

  if(stage===5){
    setChar("🤲","خَتم");
    text.innerText=
`بارك الله فيك يا ${student}.
سيفرح بك ${parent}.
اللهم زدنا علمًا وطمأنينة.`;
    nextBtn.textContent="انتهت الحصة ✅";
    nextBtn.classList.add("disabled");
    timer.innerText="تم";
  }
}

/* التالي */
function nextStep(){
  if(nextBtn.classList.contains("disabled")){
    presses++;
    helper.style.display="block";
    helper.innerText=
      presses===1?"تلميح: عدّ بهدوء مجموعة مجموعة."
      :presses===2?"ملاحظة: الجمع المتكرر هو الضرب."
      :presses===3?"مثال: ٢ مجموعات × ٣ = ٦."
      :"خذ نفسًا… الله معك.";
    speak();return;
  }

  if(stage===2 && Number(answer.value)!==a*b){
    helper.style.display="block";
    helper.innerText=
`لا بأس.
لنغيّر الطريقة ونعدّ بهدوء.
الصبر مفتاح الخير.`;
    speak();return;
  }

  stage++;
  render();
}

/* مساعدة */
function helpMe(){
  helper.style.display="block";
  helper.innerText=
`لدينا ${eastern(a)} مجموعات،
في كل مجموعة ${eastern(b)} عناصر،
الضرب = جمع متكرر.`;
  speak();
}
</script>
</body>
</html>
