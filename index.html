<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رحلة البطل الأمين – مسائل وقصص</title>

<style>
body{
  font-family:"Tajawal",Arial;
  margin:0;
  background:#eef7ee;
  color:#1b5e20;
}
.container{max-width:560px;margin:auto;padding:16px}
.card{
  background:#fff;
  border-radius:18px;
  padding:16px;
  margin-top:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.character{display:flex;gap:10px;align-items:center}
.avatar{font-size:36px}
.name{font-weight:bold}
.speech{
  background:#e0f2f1;
  padding:14px;
  border-radius:14px;
  line-height:1.9;
}
.visual{text-align:center;font-size:26px;margin:8px 0}
input{
  width:100%;
  font-size:22px;
  text-align:center;
  padding:6px;
  margin-top:6px;
}
button{
  padding:10px 16px;
  font-size:16px;
  border-radius:14px;
  border:none;
  background:#43a047;
  color:white;
  margin-top:8px;
}
.secondary{background:#1b5e20}
.hidden{display:none}
.helper{
  background:#fff8e1;
  padding:12px;
  border-radius:12px;
  margin-top:8px;
}
.footer{
  font-size:14px;
  color:#2e7d32;
  margin-top:8px;
}
</style>
</head>

<body>
<div class="container">

<!-- المقدمة -->
<div id="intro" class="card">
  <div class="character">
    <div class="avatar">🧔🏻‍♂️</div>
    <div class="name">المعلّم</div>
  </div>
  <div class="speech">
    يا بطل 🌿  
    اليوم سنتعلّم معًا بالقصص والتجربة.  
    التعلّم عبادة، والله يحب المجتهد الصبور.
  </div>

  <p>اسم الطالب:</p>
  <input id="studentName">

  <p>اسم ولي الأمر:</p>
  <input id="parentName">

  <button onclick="startLesson()">ابدأ الدرس 🤍</button>
</div>

<!-- الدرس -->
<div id="lesson" class="card hidden">

  <div class="character" id="charBox"></div>
  <div class="speech" id="textBox"></div>
  <div class="visual" id="visualBox"></div>

  <input id="answer" placeholder="اكتب الناتج هنا">

  <button onclick="checkAnswer()">أتحقق 🌱</button>
  <button class="secondary" onclick="helpMe()">أحتاج مساعدة</button>

  <div id="helperBox" class="helper hidden"></div>
  <div class="footer" id="progress"></div>

</div>
</div>

<script>
/* ===== متغيرات ===== */
let student="", parent="";
let index=0;
let correct=0;
let a=0,b=0;

/* ===== عناصر ===== */
const intro=document.getElementById("intro");
const lesson=document.getElementById("lesson");
const charBox=document.getElementById("charBox");
const textBox=document.getElementById("textBox");
const visualBox=document.getElementById("visualBox");
const answer=document.getElementById("answer");
const helperBox=document.getElementById("helperBox");
const progress=document.getElementById("progress");

/* ===== أرقام عربية ===== */
function ar(n){
  return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
}

/* ===== بنك القصص (مسائل كثيرة) ===== */
const problems=[
 {who:"🧔🏻‍♂️",name:"المعلّم",story:(a,b)=>`قال المعلّم: لدينا ${ar(a)} مجموعات، وفي كل مجموعة ${ar(b)} أشياء.`},
 {who:"👩‍👦",name:"وليّ الأمر",story:(a,b)=>`قال ${parent}: رتبتُ ${ar(a)} أطباق، في كل طبق ${ar(b)} تمرات.`},
 {who:"👦",name:"الطفل",story:(a,b)=>`قال ${student}: لدي ${ar(a)} أكياس، في كل كيس ${ar(b)} كرات.`},
 {who:"🧑‍🌾",name:"البستاني",story:(a,b)=>`زرع ${ar(a)} صفوف، في كل صف ${ar(b)} شجيرات.`},
 {who:"🐝",name:"النحلة",story:(a,b)=>`جمعت النحلة ${ar(a)} خلايا، في كل خلية ${ar(b)} قطرات عسل.`}
];

/* ===== بدء الدرس ===== */
function startLesson(){
  student=document.getElementById("studentName").value||"بطلنا";
  parent=document.getElementById("parentName").value||"وليّه";
  intro.classList.add("hidden");
  lesson.classList.remove("hidden");
  showProblem();
}

/* ===== عرض مسألة ===== */
function showProblem(){
  helperBox.classList.add("hidden");
  answer.value="";
  a=Math.floor(Math.random()*3)+2;
  b=Math.floor(Math.random()*3)+1;
  const p=problems[index%problems.length];

  charBox.innerHTML=`<div class="avatar">${p.who}</div><div class="name">${p.name}</div>`;
  textBox.innerHTML=
    `${p.story(a,b)}
    كم المجموع؟ <br>
    <b>تذكّر: الضرب جمع متكرر.</b>`;

  visualBox.innerHTML="";
  for(let i=0;i<a;i++){
    visualBox.innerHTML+="⭐ ".repeat(b)+"<br>";
  }

  progress.innerHTML=`أنجزت ${ar(correct)} مسألة 🤍`;
}

/* ===== التحقق ===== */
function checkAnswer(){
  if(Number(answer.value)===a*b){
    correct++;
    index++;
    if(correct%3===0){
      showTraining();
    }else{
      showEncouragement();
    }
  }else{
    textBox.innerHTML=
      `لا بأس يا ${student} 🌷  
      الخطأ طريق التعلّم.  
      خذ نفسًا عميقًا، والله مع الصابرين.`;
  }
}

/* ===== تشجيع ===== */
function showEncouragement(){
  textBox.innerHTML=
    `أحسنت يا ${student} 🌟  
    محاولتك عبادة جميلة،  
    وهذا يفرح ${parent}.`;
  setTimeout(showProblem,1500);
}

/* ===== تدريب عملي ===== */
function showTraining(){
  textBox.innerHTML=
    `تدريب عملي ✏️  
    اكتب في دفترك:  
    ${ar(a)} × ${ar(b)} = ؟  
    واطلب من ${parent} أن يراك ويشجّعك 🤍`;
  progress.innerHTML="استراحة تعلّم لطيفة 🌿";
}

/* ===== مساعدة ===== */
function helpMe(){
  helperBox.classList.remove("hidden");
  helperBox.innerHTML=
    `لدينا ${ar(a)} مجموعات،  
    في كل مجموعة ${ar(b)} عناصر.  
    عدّ بهدوء، الله يراك.`;
}
</script>

</body>
</html>
